name: Deploy Test

on:
  workflow_dispatch:
  push:
    branches:
      - test

permissions:
  contents: read
  id-token: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Require dev merge
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "test" ]; then
            echo "::error::Deploying test requires running from the test branch."
            exit 1
          fi
          git fetch origin dev test
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          if [ "$parent_count" -lt 2 ]; then
            echo "Deploying test requires a merge commit from dev."
            exit 1
          fi
          second_parent="$(git rev-list --parents -n 1 HEAD | awk '{print $3}')"
          git merge-base --is-ancestor "$second_parent" origin/dev

  deploy:
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.result == 'success'
    environment: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run validate

      - name: Validate AWS environment variables
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::AWS_ROLE_ARN environment variable is required for deploy."
            exit 1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "::error::AWS_REGION environment variable is required for deploy."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Confirm AWS caller identity
        run: aws sts get-caller-identity

      - name: Deploy test frontend stack
        env:
          FRONTEND_TEST_RELEASE_ID: ${{ vars.FRONTEND_RELEASE_ID }}
        run: npx cdk deploy "ZoolandingTest/*" --require-approval never
