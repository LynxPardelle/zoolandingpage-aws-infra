name: Validate promotion source

on:
  pull_request:
    branches:
      - dev
      - test
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate promotion source
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch promotion chain
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          echo "base=${BASE_REF} head=${HEAD_REF}"

          case "${BASE_REF}" in
            main)
              test "${HEAD_REF}" = "test"
              ;;
            test)
              test "${HEAD_REF}" = "dev"
              ;;
            dev)
              if [ "${HEAD_REF}" = "test" ] || [ "${HEAD_REF}" = "main" ]; then
                echo "dev only accepts feature/work branches, not ${HEAD_REF}"
                exit 1
              fi
              ;;
            *)
              echo "Unsupported protected base branch: ${BASE_REF}"
              exit 1
              ;;
          esac

