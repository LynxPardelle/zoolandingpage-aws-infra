name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run validate

      - name: Validate AWS environment variables
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::AWS_ROLE_ARN environment variable is required for deploy."
            exit 1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "::error::AWS_REGION environment variable is required for deploy."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Confirm AWS caller identity
        run: aws sts get-caller-identity

      - name: Deploy dev frontend stack
        env:
          FRONTEND_DEV_RELEASE_ID: ${{ vars.FRONTEND_RELEASE_ID }}
        run: npx cdk deploy "ZoolandingDev/*" --require-approval never
